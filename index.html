<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Mon Glow Up ✨</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Glow Up"/>
  <meta name="theme-color" content="#0A0A0A"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #FAF9F6;
      --bg2: #FFFFFF;
      --bg3: #F2F0EB;
      --border: #E5E2D9;
      --text: #1C1C1C;
      --muted: #999;
      --gold: #B8860B;
      --gold-dim: #C8960B;
      --gold-light: #FFF8E7;
      --green: #2D7A4F;
      --green-bg: #EDF7F2;
      --green-border: #A8D5BA;
      --pink: #C2185B;
      --pink-bg: #FDE8F0;
      --blue: #1A5FAD;
      --blue-bg: #E8F2FD;
      --purple: #6A1B9A;
      --purple-bg: #F3E8FD;
      --orange: #C45E1A;
      --orange-bg: #FEF0E7;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
      padding-top: env(safe-area-inset-top);
    }

    /* NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(250,249,246,0.97);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 4px; border: none; background: none;
      cursor: pointer; color: var(--muted); font-family: var(--font-body);
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn .nav-label { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; }

    /* SCREENS */
    .screen { display: none; padding: 0 0 16px; }
    .screen.active { display: block; }

    /* HEADER */
    .page-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #FFFFFF 0%, var(--bg) 100%);
    }
    .page-header .eyebrow {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .page-header h1 {
      font-family: var(--font-display); font-size: 24px; font-weight: 400;
      color: var(--text);
    }
    .page-header .subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* CARDS */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin: 12px 16px 0;
    }
    .card-title {
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    .card.gold-border { border-color: var(--gold-dim); }
    .card.green-border { border-color: var(--green-border); background: var(--green-bg); }

    /* INPUTS */
    input, textarea, select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; padding: 10px 14px;
      font-family: var(--font-body); font-size: 14px; width: 100%;
      outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--gold-dim); }
    textarea { resize: none; }
    label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
    .form-group { margin-bottom: 12px; }
    .btn {
      background: var(--gold); color: #0A0A0A; border: none;
      border-radius: 12px; padding: 12px 20px; font-family: var(--font-body);
      font-size: 14px; font-weight: 500; cursor: pointer; width: 100%;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-ghost {
      background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    }

    /* SCROLLER */
    .h-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px;
      scrollbar-width: none; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: var(--bg2);
      color: var(--muted); font-size: 11px; font-family: var(--font-body);
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .chip.active { background: var(--gold); color: #0A0A0A; border-color: var(--gold); font-weight: 500; }

    /* HOME */
    .home-hero {
      padding: 32px 18px 20px;
      text-align: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(184,134,11,0.07) 0%, transparent 60%);
    }
    .home-hero .big-emoji { font-size: 48px; margin-bottom: 12px; }
    .home-hero h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; color: var(--gold); }
    .home-hero p { font-size: 13px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px; }
    .home-tile {
      border-radius: 16px; padding: 16px 14px; cursor: pointer;
      border: 1px solid transparent; transition: transform 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .home-tile:active { transform: scale(0.97); }
    .home-tile .tile-icon { font-size: 24px; }
    .home-tile .tile-name { font-size: 13px; font-weight: 500; }
    .home-tile .tile-desc { font-size: 11px; opacity: 0.7; line-height: 1.4; }
    .streak-bar {
      margin: 16px; background: var(--bg2); border-radius: 16px;
      padding: 14px 16px; border: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .streak-num { font-family: var(--font-display); font-size: 32px; color: var(--gold); }
    .streak-label { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ROADMAP */
    .month-obj-list { padding: 0 16px; }
    .obj-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .obj-item.done { border-color: var(--green-border); background: var(--green-bg); }
    .obj-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; margin-top: 5px; }
    .obj-item.done .obj-dot { background: var(--green); }
    .obj-text { font-size: 13px; line-height: 1.55; color: var(--text); }
    .obj-item.done .obj-text { color: #2D7A4F; }
    .cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px 0; }
    .cat-tab {
      padding: 6px 12px; border-radius: 20px; font-size: 11px;
      border: 1.5px solid var(--border); background: var(--bg2);
      color: var(--muted); cursor: pointer; transition: all 0.2s;
      font-family: var(--font-body);
    }

    /* SPORT */
    .phase-header {
      margin: 12px 16px 0; border-radius: 14px; padding: 16px;
      border-left: 3px solid;
    }
    .phase-period { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
    .phase-title { font-family: var(--font-display); font-size: 18px; font-weight: 400; }
    .phase-goal { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .day-card {
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 12px; margin: 8px 16px 0; overflow: hidden; cursor: pointer;
    }
    .day-card.open { border-color: inherit; }
    .day-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; }
    .day-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .day-info { flex: 1; }
    .day-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .day-name { font-size: 14px; font-weight: 500; margin-top: 2px; }
    .day-icon { font-size: 16px; }
    .day-detail { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .day-detail p { font-size: 13px; color: #CCC; line-height: 1.5; margin: 10px 0 8px; }
    .day-tip { border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #AAA; line-height: 1.5; }

    /* NUTRITION */
    .nutrition-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .nutrition-tab {
      flex: 1; padding: 12px 6px; text-align: center; font-size: 11px;
      color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; font-family: var(--font-body);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .nutrition-tab.active { color: var(--green); border-bottom-color: var(--green); }
    .principle-card {
      border-radius: 14px; padding: 14px 16px; margin: 8px 16px 0;
      border-left: 3px solid;
    }
    .principle-priority { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
    .principle-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
    .principle-text { font-size: 13px; color: #AAA; line-height: 1.55; }
    .meal-card { border-radius: 16px; padding: 16px; margin: 8px 16px 0; border-top: 3px solid; }
    .meal-meta { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; }
    .meal-title { font-size: 16px; font-family: var(--font-display); font-weight: 400; margin-bottom: 10px; }
    .meal-item { font-size: 13px; color: #CCC; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; gap: 8px; }
    .meal-note { border-radius: 8px; padding: 8px 10px; font-size: 12px; color: #AAA; margin-top: 10px; border-left: 2px solid; }
    .swap-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin: 8px 16px 0; }
    .swap-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .swap-box { flex: 1; border-radius: 8px; padding: 8px 10px; text-align: center; font-size: 11px; font-weight: 500; }
    .swap-why { font-size: 11px; color: var(--muted); font-style: italic; text-align: center; }

    /* POIDS / MENSURATIONS */
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 16px 0; }
    .metric-tile {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px; text-align: center;
    }
    .metric-val { font-family: var(--font-display); font-size: 26px; color: var(--gold); }
    .metric-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .chart-bar-wrap { padding: 0 16px; margin-top: 16px; }
    .chart-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
    .chart-bars { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
    .chart-bar { flex: 1; border-radius: 4px 4px 0 0; transition: height 0.3s; min-width: 0; position: relative; }
    .chart-bar-label { font-size: 8px; color: var(--muted); text-align: center; margin-top: 3px; white-space: nowrap; overflow: hidden; }
    .history-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .history-date { color: var(--muted); font-size: 11px; }
    .history-val { font-weight: 500; }
    .history-diff { font-size: 11px; }

    /* JOURNAL */
    .journal-entry-preview {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; margin: 8px 16px 0; cursor: pointer;
    }
    .entry-date { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
    .entry-mood { font-size: 20px; }
    .entry-preview-text { font-size: 13px; color: #AAA; line-height: 1.5; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mood-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .mood-btn { flex: 1; font-size: 22px; padding: 10px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--bg3); cursor: pointer; transition: all 0.2s; text-align: center; }
    .mood-btn.selected { border-color: var(--gold); background: rgba(232,200,122,0.1); }

    /* HABITUDES */
    .habit-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 14px; margin: 8px 16px 0;
      cursor: pointer; transition: all 0.15s;
    }
    .habit-row.done { border-color: var(--green-border); background: var(--green-bg); }
    .habit-check {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; transition: all 0.2s; color: white;
    }
    .habit-row.done .habit-check { border-color: var(--green); background: var(--green); }
    .habit-info { flex: 1; }
    .habit-name { font-size: 14px; }
    .habit-row.done .habit-name { color: #2D7A4F; }
    .habit-cat { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .habit-streak-dot { width: 6px; height: 6px; border-radius: 50%; }
    .week-dots { display: flex; gap: 4px; margin-top: 4px; }
    .week-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .week-dot.done { background: var(--green); }
    .section-label {
      font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.15em; padding: 16px 16px 0;
    }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 200; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; align-items: flex-end; }
    .modal {
      background: #FFFFFF; border-radius: 24px 24px 0 0;
      padding: 20px 18px 40px; width: 100%;
      border-top: 1px solid var(--border);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 400; margin-bottom: 16px; }

    /* PROGRESS RING */
    .progress-ring-wrap { display: flex; justify-content: center; padding: 12px 0; }
    .ring-text { font-family: var(--font-display); font-size: 22px; fill: var(--gold); }
    .ring-sub { font-size: 10px; fill: var(--muted); }

    /* UTILS */
    .divider { height: 1px; background: var(--border); margin: 16px; }
    .tag { display: inline-block; padding: 3px 8px; border-radius: 8px; font-size: 10px; margin-right: 4px; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<!-- SCREENS -->
<div id="screen-home" class="screen active"></div>
<div id="screen-roadmap" class="screen"></div>
<div id="screen-sport" class="screen"></div>
<div id="screen-nutrition" class="screen"></div>
<div id="screen-corps" class="screen"></div>
<div id="screen-journal" class="screen"></div>
<div id="screen-habitudes" class="screen"></div>

<!-- MODAL journal -->
<div class="modal-overlay" id="journal-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="journal-modal-title">Journal du jour</div>
    <div class="form-group">
      <label>Humeur du jour</label>
      <div class="mood-row" id="mood-picker">
        <div class="mood-btn" data-mood="😄" onclick="selectMood('😄',this)">😄</div>
        <div class="mood-btn" data-mood="🙂" onclick="selectMood('🙂',this)">🙂</div>
        <div class="mood-btn" data-mood="😐" onclick="selectMood('😐',this)">😐</div>
        <div class="mood-btn" data-mood="😔" onclick="selectMood('😔',this)">😔</div>
        <div class="mood-btn" data-mood="😤" onclick="selectMood('😤',this)">😤</div>
      </div>
    </div>
    <div class="form-group">
      <label>Sport fait aujourd'hui</label>
      <input type="text" id="j-sport" placeholder="Ex: Run 35 min, séance fessiers…"/>
    </div>
    <div class="form-group">
      <label>Ce que j'ai mangé</label>
      <textarea id="j-food" rows="2" placeholder="Petit-déj, déjeuner, dîner…"></textarea>
    </div>
    <div class="form-group">
      <label>Calories estimées (optionnel)</label>
      <input type="number" id="j-cal" placeholder="Ex: 1800"/>
    </div>
    <div class="form-group">
      <label>Ce que je peux améliorer</label>
      <textarea id="j-improve" rows="2" placeholder="Une chose concrète…"></textarea>
    </div>
    <div class="form-group">
      <label>Note libre / pensée du jour</label>
      <textarea id="j-note" rows="3" placeholder="Ce que je ressens, ce qui s'est passé…"></textarea>
    </div>
    <button class="btn" onclick="saveJournal()">Enregistrer ✓</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal('journal-modal')">Annuler</button>
  </div>
</div>

<!-- MODAL poids -->
<div class="modal-overlay" id="poids-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Ajouter un poids</div>
    <div class="form-group">
      <label>Poids (kg)</label>
      <input type="number" step="0.1" id="p-weight" placeholder="Ex: 87.5"/>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="p-date"/>
    </div>
    <div class="form-group">
      <label>Note (optionnel)</label>
      <input type="text" id="p-note" placeholder="Ex: après règles, matin…"/>
    </div>
    <button class="btn" onclick="savePoids()">Enregistrer ✓</button>
    <button class="btn btn-ghost" style="margin-top:8px" onclick="closeModal('poids-modal')">Annuler</button>
  </div>
</div>

<!-- MODAL mensurations -->
<div class="modal-overlay" id="mensur-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Mensurations</div>
    <div style="font-size:11px;color:#AAA;margin-bottom:12px">Corps</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Fesses (cm)</label><input type="number" step="0.5" id="m-fesses" placeholder="—"/></div>
      <div class="form-group"><label>Bas du ventre (cm)</label><input type="number" step="0.5" id="m-bas-ventre" placeholder="—"/></div>
      <div class="form-group"><label>Taille (cm)</label><input type="number" step="0.5" id="m-taille" placeholder="—"/></div>
      <div class="form-group"><label>Dessous poitrine (cm)</label><input type="number" step="0.5" id="m-dessous-poitrine" placeholder="—"/></div>
      <div class="form-group"><label>Poitrine (cm)</label><input type="number" step="0.5" id="m-poitrine" placeholder="—"/></div>
      <div class="form-group"><label>Épaules (cm)</label><input type="number" step="0.5" id="m-epaule" placeholder="—"/></div>
    </div>
    <div style="font-size:11px;color:#AAA;margin:4px 0 12px">Jambes</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Cuisse droite (cm)</label><input type="number" step="0.5" id="m-cuisse-droite" placeholder="—"/></div>
      <div class="form-group"><label>Cuisse gauche (cm)</label><input type="number" step="0.5" id="m-cuisse-gauche" placeholder="—"/></div>
      <div class="form-group"><label>Mollet droit (cm)</label><input type="number" step="0.5" id="m-mollet-droit" placeholder="—"/></div>
      <div class="form-group"><label>Mollet gauche (cm)</label><input type="number" step="0.5" id="m-mollet-gauche" placeholder="—"/></div>
    </div>
    <div style="font-size:11px;color:#AAA;margin:4px 0 12px">Bras & Autres</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Bras droit (cm)</label><input type="number" step="0.5" id="m-bras-droit" placeholder="—"/></div>
      <div class="form-group"><label>Bras gauche (cm)</label><input type="number" step="0.5" id="m-bras-gauche" placeholder="—"/></div>
      <div class="form-group"><label>Cou (cm)</label><input type="number" step="0.5" id="m-cou" placeholder="—"/></div>
      <div class="form-group"><label>Annulaire G (cm)</label><input type="number" step="0.5" id="m-annulaire" placeholder="—"/></div>
      <div class="form-group"><label>Main G (cm)</label><input type="number" step="0.5" id="m-main" placeholder="—"/></div>
      <div class="form-group"><label>Index G (cm)</label><input type="number" step="0.5" id="m-index" placeholder="—"/></div>
    </div>

// ============================================================
// NAVIGATION
// ============================================================
function showScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  state.currentScreen = name;
  renderScreen(name);
}

// ============================================================
// RENDER ROUTER
// ============================================================
function renderScreen(name) {
  if (name === 'home') renderHome();
  else if (name === 'roadmap') renderRoadmap();
  else if (name === 'sport') renderSport();
  else if (name === 'nutrition') renderNutrition();
  else if (name === 'corps') renderCorps();
  else if (name === 'journal') renderJournal();
  else if (name === 'habitudes') renderHabitudes();
}

function setNutritionTab(i) { state.nutrition.tab=i; renderNutrition(); }

// CORPS
// ============================================================
function renderCorps() {
  const poids = state.data.poids;
  const mensurations = state.data.mensurations;
  const tab = state.corps.tab;

  const lastPoids = poids.length ? poids[poids.length-1] : null;
  const firstPoids = poids.length ? poids[0] : null;
  const diff = (lastPoids && firstPoids && poids.length > 1) ? (lastPoids.w - firstPoids.w).toFixed(1) : null;
  const lastMensur = mensurations.length ? mensurations[mensurations.length-1] : null;

  document.getElementById('screen-corps').innerHTML = `
    <div class="page-header">
      <div class="eyebrow">Suivi Corps</div>
      <h1>Évolution</h1>
      <div class="subtitle">Poids · Mensurations · Progression</div>
    </div>
    <div class="h-scroll">
      <div class="chip ${tab===0?'active':''}" onclick="setCorpsTab(0)">📉 Poids</div>
      <div class="chip ${tab===1?'active':''}" onclick="setCorpsTab(1)">📏 Mensurations</div>
    </div>
    ${tab===0 ? renderPoidsTab(poids, lastPoids, diff) : renderMensurTab(mensurations, lastMensur)}
  `;
}

function renderPoidsTab(poids, last, diff) {
  const recent = [...poids].reverse().slice(0,20);
  const vals = recent.map(p=>p.w).reverse();
  const minV = vals.length ? Math.min(...vals)-1 : 80;
  const maxV = vals.length ? Math.max(...vals)+1 : 95;
  const range = maxV - minV || 1;

  return `
    <div class="metric-grid">
      <div class="metric-tile">
        <div class="metric-val">${last ? last.w : '—'}</div>
        <div class="metric-unit">kg actuels</div>
        <div class="metric-label">Dernier pesée</div>
      </div>
      <div class="metric-tile">
        <div class="metric-val" style="color:${diff===null?'#666':parseFloat(diff)<0?'#4CAF7D':'#E07A9A'}">${diff!==null?(parseFloat(diff)>0?'+':'')+diff:'—'}</div>
        <div class="metric-unit">kg depuis début</div>
        <div class="metric-label">Évolution totale</div>
      </div>
    </div>
    <div style="padding:16px">
      <div style="background:#FFF8E7;border-radius:14px;padding:16px;border:1px solid #E8D5A0">
        <div style="font-size:10px;color:#A0760A;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px">Objectif</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-family:var(--font-display);font-size:18px;color:#A0760A">88 → 60 kg</div>
          <div style="font-size:12px;color:#888">−28 kg · 23 octobre 2027</div>
        </div>
        ${last ? `<div style="margin-top:10px;background:#E8D5A0;border-radius:10px;height:6px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,Math.max(0,((88-last.w)/28)*100)).toFixed(0)}%;background:linear-gradient(90deg,#2D7A4F,#B8860B);border-radius:10px"></div>
        </div>
        <div style="font-size:11px;color:#888;margin-top:4px">${Math.max(0,((88-last.w)/28*100)).toFixed(0)}% de l'objectif · ${Math.max(0,(last.w-60)).toFixed(1)} kg restants</div>` : ''}
      </div>
    </div>
    ${vals.length > 1 ? `
    <div class="chart-bar-wrap">
      <div class="chart-title">Courbe de poids (${vals.length} mesures)</div>
      <div class="chart-bars">
        ${vals.map((v,i) => {
          const h = Math.max(4, ((v-minV)/range)*70);
          const isLast = i===vals.length-1;
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
            <div class="chart-bar" style="height:${h}px;background:${isLast?'#B8860B':'#E5E2D9'};width:100%"></div>
            <div class="chart-bar-label" style="color:#999">${v}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : `<div style="padding:16px;text-align:center;color:#888;font-size:13px">Ajoute des mesures pour voir ta courbe apparaître ✨</div>`}
    <div style="padding:0 16px">
      <button class="btn" onclick="openModal('poids-modal')" style="margin-top:12px">+ Ajouter un poids</button>
    </div>
    ${poids.length ? `
    <div style="padding:12px 16px 0">
      <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px">Historique</div>
      ${[...poids].reverse().slice(0,10).map((p,i,arr) => {
        const prev = arr[i+1];
        const d = prev ? (p.w-prev.w).toFixed(1) : null;
        return `<div class="history-row">
          <span class="history-date">${p.date}</span>
          <span class="history-val">${p.w} kg</span>
          ${d!==null?`<span class="history-diff" style="color:${parseFloat(d)<0?'#2D7A4F':'#C2185B'}">${parseFloat(d)>0?'+':''}${d}</span>`:'<span></span>'}
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

function renderMensurTab(mensurations, last) {
  const first = mensurations[0];
  const allZones = [
    {key:'fesses',label:'Fesses',icon:'🍑',group:'Corps'},
    {key:'bas_ventre',label:'Bas ventre',icon:'🌿',group:'Corps'},
    {key:'taille',label:'Taille',icon:'📏',group:'Corps'},
    {key:'dessous_poitrine',label:'Dessous poitrine',icon:'🎀',group:'Corps'},
    {key:'poitrine',label:'Poitrine',icon:'👙',group:'Corps'},
    {key:'epaule',label:'Épaules',icon:'💪',group:'Corps'},
    {key:'cuisse_droite',label:'Cuisse D',icon:'🦵',group:'Jambes'},
    {key:'cuisse_gauche',label:'Cuisse G',icon:'🦵',group:'Jambes'},
    {key:'mollet_droit',label:'Mollet D',icon:'🦶',group:'Jambes'},
    {key:'mollet_gauche',label:'Mollet G',icon:'🦶',group:'Jambes'},
    {key:'bras_droit',label:'Bras D',icon:'💪',group:'Bras'},
    {key:'bras_gauche',label:'Bras G',icon:'💪',group:'Bras'},
    {key:'cou',label:'Cou',icon:'✨',group:'Autres'},
    {key:'annulaire',label:'Annulaire G',icon:'💍',group:'Autres'},
    {key:'main',label:'Main G',icon:'🖐',group:'Autres'},
    {key:'index',label:'Index G',icon:'👆',group:'Autres'},
  ];

  // key metrics for the top tiles
  const topZones = [
    {key:'taille',label:'Taille',icon:'📏'},
    {key:'fesses',label:'Fesses',icon:'🍑'},
    {key:'poitrine',label:'Poitrine',icon:'👙'},
    {key:'cuisse_droite',label:'Cuisses',icon:'🦵'},
  ];

  const groups = [...new Set(allZones.map(z=>z.group))];

  return `
    <div class="metric-grid">
      ${topZones.map(z => {
        const val = last ? last[z.key] : null;
        const firstVal = first ? first[z.key] : null;
        const d = (val && firstVal && mensurations.length>1) ? (val-firstVal).toFixed(1) : null;
        return `<div class="metric-tile">
          <div style="font-size:20px;margin-bottom:4px">${z.icon}</div>
          <div class="metric-val" style="font-size:20px">${val||'—'}</div>
          <div class="metric-unit">cm</div>
          <div class="metric-label">${z.label}</div>
          ${d!==null?`<div style="font-size:11px;color:${parseFloat(d)<0?'#2D7A4F':'#C2185B'};margin-top:2px">${parseFloat(d)>0?'+':''}${d} cm</div>`:''}
        </div>`;
      }).join('')}
    </div>

    ${last ? `
    <div style="padding:12px 16px 0">
      ${groups.map(g => {
        const zs = allZones.filter(z=>z.group===g);
        return `<div style="background:#FFFFFF;border:1px solid #E5E2D9;border-radius:14px;padding:14px;margin-bottom:10px">
          <div style="font-size:10px;color:#AAA;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px">${g}</div>
          <div style="display:grid;grid-template-columns:repeat(${zs.length<=2?2:3},1fr);gap:8px">
            ${zs.map(z => {
              const val = last[z.key];
              const fv = first ? first[z.key] : null;
              const d = (val && fv && mensurations.length>1) ? (val-fv).toFixed(1) : null;
              return `<div style="text-align:center;padding:8px 4px;background:#FAF9F6;border-radius:10px">
                <div style="font-size:16px">${z.icon}</div>
                <div style="font-size:15px;font-weight:500;margin-top:2px">${val||'—'}</div>
                <div style="font-size:9px;color:#AAA;margin-top:1px">${z.label}</div>
                ${d!==null?`<div style="font-size:10px;color:${parseFloat(d)<0?'#2D7A4F':'#C2185B'}">${parseFloat(d)>0?'+':''}${d}</div>`:'<div style="font-size:10px;color:#DDD">départ</div>'}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div style="padding:0 16px">
      <button class="btn" onclick="openModal('mensur-modal')" style="margin-top:4px">+ Nouvelles mensurations</button>
    </div>
    <div style="padding:6px 16px 0;font-size:12px;color:#AAA;text-align:center">
      📅 Toutes les 2 semaines — le matin à jeun
    </div>

    ${mensurations.length > 1 ? `
    <div style="padding:12px 16px 0">
      <div style="font-size:10px;color:#AAA;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px">Historique complet</div>
      ${[...mensurations].reverse().map(m => `
        <div style="background:#FAFAF8;border:1px solid #E5E2D9;border-radius:12px;padding:12px;margin-bottom:8px">
          <div style="font-size:11px;color:#AAA;margin-bottom:8px;font-weight:500">${m.date}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px">
            ${allZones.slice(0,8).map(z => `<div style="text-align:center"><div style="font-size:12px;font-weight:500">${m[z.key]||'—'}</div><div style="font-size:9px;color:#AAA">${z.label}</div></div>`).join('')}
          </div>
        </div>`).join('')}
    </div>` : ''}
  `;
}

function setCorpsTab(i) { state.corps.tab=i; renderCorps(); }

function renderJournal() {
  const entries = Object.entries(state.data.journal).sort((a,b)=>b[0].localeCompare(a[0]));
  const today = todayKey();
  const hasToday = !!state.data.journal[today];

  document.getElementById('screen-journal').innerHTML = `
    <div class="page-header">
      <div class="eyebrow">Journal de bord</div>
      <h1>Mes journées</h1>
      <div class="subtitle">Humeur · Sport · Alimentation · Réflexions</div>
    </div>
    <div style="padding:12px 16px 0">
      <button class="btn" onclick="openJournalModal('${today}')">${hasToday ? '✏️ Modifier aujourd\'hui' : '+ Écrire aujourd\'hui'}</button>
    </div>
    ${!entries.length ? `<div style="padding:32px 16px;text-align:center;color:#AAA;font-size:13px;line-height:1.7">
      Ton journal est vide pour l'instant.<br/>Commence par écrire ta première entrée ✨

    <div style="padding:12px 16px 0;font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.15em">Entrées récentes</div>

      <div class="journal-entry-preview" onclick="openJournalModal('${date}')">
        <div class="flex-between">
          <div class="entry-date">${formatDate(date)}</div>
          <div class="entry-mood">${entry.mood||'—'}</div>
        </div>
        ${entry.sport ? `<div style="font-size:11px;color:#4CAF7D;margin-top:4px">🏃‍♀️ ${entry.sport}</div>` : ''}
        ${entry.note ? `<div class="entry-preview-text" style="color:#555">${entry.note}</div>` : ''}
        ${entry.improve ? `<div style="font-size:11px;color:#A07AE0;margin-top:4px">💡 ${entry.improve}</div>` : ''}
      </div>`).join('')}
    `}

}

function openJournalModal(date) {
  state.journal.editDate = date;
  const entry = state.data.journal[date] || {};
  document.getElementById('journal-modal-title').textContent = 'Journal — ' + formatDate(date);
  document.getElementById('j-sport').value = entry.sport||'';
  document.getElementById('j-food').value = entry.food||'';
  document.getElementById('j-cal').value = entry.cal||'';
  document.getElementById('j-improve').value = entry.improve||'';
  document.getElementById('j-note').value = entry.note||'';
  state.selectedMood = entry.mood||null;
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood===state.selectedMood);
  });
  openModal('journal-modal');
}

function selectMood(mood, el) {
  state.selectedMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}

function saveJournal() {
  const date = state.journal.editDate;
  state.data.journal[date] = {
    mood: state.selectedMood,
    sport: document.getElementById('j-sport').value,
    food: document.getElementById('j-food').value,
    cal: document.getElementById('j-cal').value,
    improve: document.getElementById('j-improve').value,
    note: document.getElementById('j-note').value
  };
  save();
  closeModal('journal-modal');
  renderJournal();
}

// ============================================================
// HABITUDES
// ============================================================
function getTodayHabits() {
  const now = new Date();
  const monthIdx = getMonthIdx(now);
  return HABITS_SCHEDULE.filter(h => h.startMonth <= monthIdx);
}

function getMonthIdx(date) {
  const start = new Date(2026, 4, 1); // May 2026
  const months = (date.getFullYear()-start.getFullYear())*12 + (date.getMonth()-start.getMonth());
  return Math.max(0, Math.min(MONTHS.length-1, months));
}

function renderHabitudes() {
  const today = todayKey();
  const todayData = state.data.habitudes[today] || {};
  const habits = getTodayHabits();
  const done = habits.filter(h=>todayData[h.id]).length;

  // group by cat
  const groups = {};
  habits.forEach(h => {
    if (!groups[h.cat]) groups[h.cat] = [];
    groups[h.cat].push(h);
  });

  // last 7 days
  const last7 = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    last7.push(dateKey(d));
  }

  document.getElementById('screen-habitudes').innerHTML = `
    <div class="page-header">
      <div class="eyebrow">Tracker d'habitudes</div>
      <h1>Mes habitudes</h1>
      <div class="subtitle">${done}/${habits.length} complétées aujourd'hui</div>
    </div>
    <div style="padding:12px 16px 0">
      <div style="background:#FFFFFF;border-radius:14px;padding:14px;border:1px solid #E5E2D9">
        <div class="flex-between" style="margin-bottom:10px">
          <div style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:0.12em">Progression du jour</div>
          <div style="font-family:var(--font-display);font-size:18px;color:#E8C87A">${done}/${habits.length}</div>
        </div>
        <div style="background:#F0EDE8;border-radius:10px;height:8px;overflow:hidden">
          <div style="height:100%;width:${habits.length?((done/habits.length)*100).toFixed(0):0}%;background:linear-gradient(90deg,#4CAF7D,#E8C87A);border-radius:10px;transition:width 0.3s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:10px">
          ${last7.map(d => {
            const dData = state.data.habitudes[d]||{};
            const allH = HABITS_SCHEDULE.filter(h=>h.startMonth<=getMonthIdx(new Date(d+'T12:00:00')));
            const dDone = allH.filter(h=>dData[h.id]).length;
            const pct = allH.length ? dDone/allH.length : 0;
            const isToday = d===today;
            return `<div style="text-align:center">
              <div style="width:28px;height:28px;border-radius:50%;background:${pct>=1?'#2D7A4F':pct>0.5?'#B8860B':'#EEEBE4'};margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:10px;border:${isToday?'2px solid #B8860B':'1px solid #E5E2D9'}">${dDone||''}</div>
              <div style="font-size:9px;color:#888;margin-top:3px">${['D','S','V','J','M','M','L','D','S','V','J','M','M','L'][new Date(d+'T12:00:00').getDay()]}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    ${Object.entries(groups).map(([cat, hs]) => `
      <div class="section-label">${cat}</div>
      ${hs.map(h => {
        const isDone = !!todayData[h.id];
        return `<div class="habit-row ${isDone?'done':''}" onclick="toggleHabit('${h.id}')">
          <div class="habit-check">${isDone?'✓':''}</div>
          <div class="habit-info">
            <div class="habit-name">${h.name}</div>
          </div>
        </div>`;
      }).join('')}
    `).join('')}
    <div style="padding:16px;text-align:center;color:#444;font-size:12px;line-height:1.6">
      Les habitudes apparaissent progressivement<br/>au fil des mois 🌱
    </div>
  `;
}

function toggleHabit(id) {
  const today = todayKey();
  if (!state.data.habitudes[today]) state.data.habitudes[today] = {};
  state.data.habitudes[today][id] = !state.data.habitudes[today][id];
  save();
  renderHabitudes();
  renderHome();
}

// ============================================================
// MODALS
// ============================================================
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); });
});

function savePoids() {
  const w = parseFloat(document.getElementById('p-weight').value);
  const date = document.getElementById('p-date').value || todayKey();
  const note = document.getElementById('p-note').value;
  if (!w) return;
  state.data.poids.push({w, date, note});
  state.data.poids.sort((a,b)=>a.date.localeCompare(b.date));
  save();
  closeModal('poids-modal');
  document.getElementById('p-weight').value='';
  document.getElementById('p-note').value='';
  renderCorps();
}

function saveMensurations() {
  const date = document.getElementById('m-date').value || todayKey();
  const g = id => { const el = document.getElementById(id); return el && el.value ? parseFloat(el.value) : null; };
  const entry = {
    date,
    fesses: g('m-fesses'), bas_ventre: g('m-bas-ventre'),
    taille: g('m-taille'), dessous_poitrine: g('m-dessous-poitrine'),
    poitrine: g('m-poitrine'), epaule: g('m-epaule'),
    cuisse_droite: g('m-cuisse-droite'), cuisse_gauche: g('m-cuisse-gauche'),
    mollet_droit: g('m-mollet-droit'), mollet_gauche: g('m-mollet-gauche'),
    bras_droit: g('m-bras-droit'), bras_gauche: g('m-bras-gauche'),
    cou: g('m-cou'), annulaire: g('m-annulaire'),
    main: g('m-main'), index: g('m-index')
  };
  state.data.mensurations.push(entry);
  state.data.mensurations.sort((a,b)=>a.date.localeCompare(b.date));
  save();
  closeModal('mensur-modal');
  renderCorps();
}

// ============================================================
// UTILS
// ============================================================
function todayKey() { return dateKey(new Date()); }
function dateKey(d) { return d.toISOString().split('T')[0]; }

function formatDate(str) {
  const d = new Date(str+'T12:00:00');
  return d.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'});
}

function calcStreak() {
  let streak = 0;
  const now = new Date();
  for (let i=0; i<365; i++) {
    const d = new Date(now); d.setDate(now.getDate()-i);
    const key = dateKey(d);
    const dayData = state.data.habitudes[key]||{};
    const allH = HABITS_SCHEDULE.filter(h=>h.startMonth<=getMonthIdx(d));
    if (!allH.length) { streak++; continue; }
    const doneCount = allH.filter(h=>dayData[h.id]).length;
    if (doneCount >= Math.ceil(allH.length * 0.7)) streak++;
    else break;
  }
  return streak;
}

// Set default dates in modals
document.getElementById('p-date').value = todayKey();
document.getElementById('m-date').value = todayKey();

// Init
renderHome();
